version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
      - "/auth"
      - "/batch"
      - "/cache"
      - "/concurrency"
      - "/config"
      - "/context"
      - "/cqrs"
      - "/cqrs/examples"
      - "/db"
      - "/eventsourcing"
      - "/flight_trace"
      - "/flags"
      - "/freeport"
      - "/fsm"
      - "/graceful_shutdown"
      - "/grpc"
      - "/golangci-lint"
      - "/golangci-lint/cqrs-naming"
      - "/http"
      - "/kratos"
      - "/logger"
      - "/mq"
      - "/notify"
      - "/observability"
      - "/protoc"
      - "/raft"
      - "/s3"
      - "/saga"
      - "/specification"
      - "/temporal"
      - "/transactional_outbox"
      - "/types"
      - "/uow"
      - "/watermill"
    schedule:
      interval: "daily"
    groups:
      testcontainers-go:
        patterns:
          - "github.com/testcontainers/testcontainers-go"
          - "github.com/testcontainers/testcontainers-go/modules/*"
